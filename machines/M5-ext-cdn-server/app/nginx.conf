user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /var/log/bunl/cdn-server/access.log;
    error_log /var/log/bunl/cdn-server/error.log;

    server {
        listen 80;
        server_name _;

        root /opt/bunl/cdn-server/webroot;
        index index.html;

        # Serve the CDN landing page
        location / {
            try_files $uri $uri/ =404;
        }

        # Static assets — VULNERABLE: missing trailing slash on alias
        # /assets../  traverses to /opt/bunl/cdn-server/assets/../ = /opt/bunl/cdn-server/
        location /assets {
            alias /opt/bunl/cdn-server/assets/;
        }

        # API health check
        location /cdn-api/health {
            return 200 '{"status":"ok","service":"BUNL CDN Static Server","version":"1.3.0"}';
            add_header Content-Type application/json;
        }

        # CDN management stub (restricted)
        location /cdn-api/purge {
            return 401 '{"error":"Authentication required","realm":"BUNL CDN Management"}';
            add_header Content-Type application/json;
            add_header WWW-Authenticate 'Bearer realm="BUNL CDN"';
        }
    }
}
